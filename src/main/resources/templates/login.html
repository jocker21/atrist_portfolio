<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход | Админ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="card-title mb-4 text-center">Вход в админ-панель</h4>

                    <!-- Сообщение об ошибке входа -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        Неверное имя пользователя или пароль
                    </div>

                    <!-- Сообщение о выходе -->
                    <div th:if="${param.logout}" class="alert alert-info">
                        Вы успешно вышли из системы
                    </div>

                    <!--
                      action="/login" — Spring Security сам обрабатывает этот URL.
                      Имена полей username и password — стандарт Spring Security,
                      менять их нельзя (или нужно настраивать отдельно).
                    -->
                    <form action="/login" method="post">
                        <!-- CSRF токен — Thymeleaf добавляет автоматически -->
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label">Имя пользователя</label>
                            <input type="text" class="form-control"
                                   name="username"
                                   autocomplete="username"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-control"
                                   name="password"
                                   autocomplete="current-password"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-dark w-100">Войти</button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/}" class="text-muted small">← На сайт</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
