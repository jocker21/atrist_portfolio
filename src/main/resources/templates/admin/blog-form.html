<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Статья | Админ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/blog}">← Назад к блогу</a>
    </div>
</nav>

<main class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-9">
            <h1 th:text="${post.id != null} ? 'Редактировать статью' : 'Новая статья'"
                class="mb-4"></h1>

            <form th:action="${post.id != null}
                              ? @{/admin/blog/{id}/edit(id=${post.id})}
                              : @{/admin/blog/new}"
                  th:object="${post}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">Заголовок <span class="text-danger">*</span></label>
                    <input type="text" class="form-control"
                           th:field="*{title}"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                           placeholder="Заголовок статьи">
                    <div class="invalid-feedback" th:errors="*{title}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Slug (URL)</label>
                    <input type="text" class="form-control"
                           th:field="*{slug}"
                           placeholder="moya-pervaya-vystavka (оставь пустым — сгенерируется автоматически)">
                    <div class="form-text">Только латинские буквы, цифры и дефис</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Краткое описание</label>
                    <textarea class="form-control" rows="2"
                              th:field="*{excerpt}"
                              placeholder="Краткое описание для карточки в блоге"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Текст статьи <span class="text-danger">*</span></label>
                    <textarea class="form-control" rows="15"
                              th:field="*{content}"
                              th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"
                              placeholder="Полный текст статьи..."></textarea>
                    <div class="invalid-feedback" th:errors="*{content}"></div>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input"
                           th:field="*{published}" id="published">
                    <label class="form-check-label" for="published">
                        Опубликовать статью
                    </label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">Сохранить</button>
                    <a th:href="@{/admin/blog}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
