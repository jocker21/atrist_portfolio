<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Блог | Админ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Админ-панель</span>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link" th:href="@{/admin/artworks}">Работы</a>
            <a class="nav-link active" th:href="@{/admin/blog}">Блог</a>
            <a class="nav-link" th:href="@{/}">На сайт</a>
            <a class="nav-link" th:href="@{/logout}">Выйти</a>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Статьи блога</h1>
        <a th:href="@{/admin/blog/new}" class="btn btn-dark">+ Новая статья</a>
    </div>

    <table class="table table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>Заголовок</th>
            <th>Slug</th>
            <th>Опубликована</th>
            <th>Дата</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${posts}">
            <td th:text="${post.title}">Заголовок</td>
            <td><code th:text="${post.slug}">slug</code></td>
            <td>
                <span th:if="${post.published}" class="badge bg-success">Да</span>
                <span th:unless="${post.published}" class="badge bg-secondary">Черновик</span>
            </td>
            <td th:text="${post.publishedAt != null}
                         ? ${#temporals.format(post.publishedAt, 'dd.MM.yyyy')}
                         : '—'">
            </td>
            <td>
                <a th:href="@{/admin/blog/{id}/edit(id=${post.id})}"
                   class="btn btn-sm btn-outline-dark me-1">Изменить</a>
                <form th:action="@{/admin/blog/{id}/delete(id=${post.id})}"
                      method="post" style="display:inline;"
                      onsubmit="return confirm('Удалить статью?')">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Удалить</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(posts)}">
            <td colspan="5" class="text-center text-muted py-4">
                Статей пока нет. <a th:href="@{/admin/blog/new}">Написать первую?</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
