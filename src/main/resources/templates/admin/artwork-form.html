<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Форма картини | Адмін</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/artworks}">← Назад до картин</a>
    </div>
</nav>

<main class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <h1 th:text="${artwork.id != null} ? 'Редагувати картину' : 'Нова картина'"
                class="mb-4"></h1>

            <form th:action="${artwork.id != null}
                              ? @{/admin/artworks/{id}/edit(id=${artwork.id})}
                              : @{/admin/artworks/new}"
                  th:object="${artwork}"
                  method="post"
                  enctype="multipart/form-data">

                <!-- Назва -->
                <div class="mb-3">
                    <label class="form-label">Назва <span class="text-danger">*</span></label>
                    <input type="text" class="form-control"
                           th:field="*{title}"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                           placeholder="Назва роботи">
                    <div class="invalid-feedback" th:errors="*{title}"></div>
                </div>

                <!-- Рік + Ціна -->
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Рік <span class="text-danger">*</span></label>
                        <input type="number" class="form-control"
                               th:field="*{year}"
                               th:classappend="${#fields.hasErrors('year')} ? 'is-invalid'"
                               min="1900" max="2099">
                        <div class="invalid-feedback" th:errors="*{year}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Ціна (грн)</label>
                        <input type="number" class="form-control"
                               th:field="*{price}"
                               th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                               min="0" step="0.01"
                               placeholder="0.00">
                        <div class="invalid-feedback" th:errors="*{price}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Жанр</label>
                        <select class="form-select" th:field="*{genre}">
                            <option value="">— оберіть —</option>
                            <option value="Портрет">Портрет</option>
                            <option value="Пейзаж">Пейзаж</option>
                            <option value="Натюрморт">Натюрморт</option>
                            <option value="Абстракція">Абстракція</option>
                            <option value="Анімалістика">Анімалістика</option>
                            <option value="Міський пейзаж">Міський пейзаж</option>
                            <option value="Морський пейзаж">Морський пейзаж</option>
                            <option value="Інше">Інше</option>
                        </select>
                    </div>
                </div>

                <!-- Матеріал + Основа -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Матеріал</label>
                        <select class="form-select" th:field="*{material}">
                            <option value="">— оберіть —</option>
                            <option value="Олія">Олія</option>
                            <option value="Акварель">Акварель</option>
                            <option value="Акрил">Акрил</option>
                            <option value="Пастель">Пастель</option>
                            <option value="Графіт">Графіт</option>
                            <option value="Вугілля">Вугілля</option>
                            <option value="Темпера">Темпера</option>
                            <option value="Змішана техніка">Змішана техніка</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Основа</label>
                        <select class="form-select" th:field="*{surface}">
                            <option value="">— оберіть —</option>
                            <option value="Полотно">Полотно</option>
                            <option value="Папір">Папір</option>
                            <option value="Картон">Картон</option>
                            <option value="Дерево">Дерево</option>
                            <option value="ДВП">ДВП</option>
                            <option value="Оргаліт">Оргаліт</option>
                        </select>
                    </div>
                </div>

                <!-- Розміри -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ширина (см)</label>
                        <input type="number" class="form-control"
                               th:field="*{widthCm}"
                               min="1" placeholder="60">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Висота (см)</label>
                        <input type="number" class="form-control"
                               th:field="*{heightCm}"
                               min="1" placeholder="80">
                    </div>
                </div>

                <!-- Опис -->
                <div class="mb-3">
                    <label class="form-label">Опис</label>
                    <textarea class="form-control" rows="4"
                              th:field="*{description}"
                              placeholder="Опис роботи, історія створення..."></textarea>
                </div>

                <!-- Категорії -->
                <div class="mb-3">
                    <label class="form-label">Категорії</label>
                    <div class="d-flex flex-wrap gap-2">
                        <div th:each="cat : ${categories}" class="form-check">
                            <input class="form-check-input" type="checkbox"
                                   name="categoryIds"
                                   th:value="${cat.id}"
                                   th:checked="${artwork.categories != null and artwork.categories.contains(cat)}">
                            <label class="form-check-label" th:text="${cat.name}"></label>
                        </div>
                    </div>
                </div>

                <!-- Зображення -->
                <div class="mb-3">
                    <label class="form-label">Зображення</label>
                    <div th:if="${artwork.imageUrl}" class="mb-2">
                        <img th:src="@{'/' + artwork.imageUrl}"
                             style="max-height: 150px; border-radius: 4px;"
                             alt="Поточне зображення">
                        <p class="text-muted small mt-1">Завантажте нове зображення щоб замінити</p>
                    </div>
                    <input type="file" class="form-control"
                           name="imageFile"
                           accept="image/*">
                </div>

                <!-- Доступна + Опублікована -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input"
                                   th:field="*{available}" id="available">
                            <label class="form-check-label" for="available">
                                Доступна для продажу
                            </label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input"
                                   th:field="*{published}" id="published">
                            <label class="form-check-label" for="published">
                                Опублікувати в галереї
                            </label>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">Зберегти</button>
                    <a th:href="@{/admin/artworks}" class="btn btn-outline-secondary">Скасувати</a>
                </div>

            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
