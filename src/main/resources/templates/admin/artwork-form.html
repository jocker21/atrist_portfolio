<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Форма работы | Админ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/artworks}">← Назад к работам</a>
    </div>
</nav>

<main class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <!-- th:text с тернарным оператором: если у работы есть id — это редактирование -->
            <h1 th:text="${artwork.id != null} ? 'Редактировать работу' : 'Новая работа'"
                class="mb-4">
            </h1>

            <!--
              enctype="multipart/form-data" — обязательно для загрузки файлов!
              Без него файл не передастся на сервер.
            -->
            <form th:action="${artwork.id != null}
                              ? @{/admin/artworks/{id}/edit(id=${artwork.id})}
                              : @{/admin/artworks/new}"
                  th:object="${artwork}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Название <span class="text-danger">*</span></label>
                    <input type="text" class="form-control"
                           th:field="*{title}"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                           placeholder="Название работы">
                    <div class="invalid-feedback" th:errors="*{title}"></div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Год <span class="text-danger">*</span></label>
                        <input type="number" class="form-control"
                               th:field="*{year}"
                               th:classappend="${#fields.hasErrors('year')} ? 'is-invalid'"
                               min="1900" max="2099">
                        <div class="invalid-feedback" th:errors="*{year}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Техника</label>
                        <input type="text" class="form-control"
                               th:field="*{technique}"
                               placeholder="Масло, акварель...">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Размеры</label>
                        <input type="text" class="form-control"
                               th:field="*{dimensions}"
                               placeholder="60×80 см">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Описание</label>
                    <textarea class="form-control" rows="4"
                              th:field="*{description}"
                              placeholder="Описание работы, история создания..."></textarea>
                </div>

                <!-- Категории — чекбоксы -->
                <div class="mb-3">
                    <label class="form-label">Категории</label>
                    <div class="d-flex flex-wrap gap-2">
                        <div th:each="cat : ${categories}" class="form-check">
                            <!--
                              th:value — значение чекбокса = id категории
                              th:checked — отмечен если artwork.categories содержит эту категорию
                              name="categories" — Spring соберёт все отмеченные в список
                            -->
                            <input class="form-check-input" type="checkbox"
                                   name="categoryIds"
                                   th:value="${cat.id}"
                                   th:checked="${artwork.categories != null and artwork.categories.contains(cat)}">
                            <label class="form-check-label" th:text="${cat.name}"></label>
                        </div>
                    </div>
                </div>

                <!-- Загрузка изображения -->
                <div class="mb-3">
                    <label class="form-label">Изображение</label>
                    <!-- Показываем текущее изображение если оно есть -->
                    <div th:if="${artwork.imageUrl}" class="mb-2">
                        <img th:src="@{'/' + artwork.imageUrl}"
                             style="max-height: 150px; border-radius: 4px;"
                             alt="Текущее изображение">
                        <p class="text-muted small mt-1">Загрузите новое изображение чтобы заменить</p>
                    </div>
                    <!--
                      type="file" с name="imageFile" — Spring MVC получит его
                      как MultipartFile imageFile в контроллере
                    -->
                    <input type="file" class="form-control"
                           name="imageFile"
                           accept="image/*">
                </div>

                <!-- Чекбокс публикации -->
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input"
                           th:field="*{published}" id="published">
                    <label class="form-check-label" for="published">
                        Опубликовать в галерее
                    </label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">Сохранить</button>
                    <a th:href="@{/admin/artworks}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
