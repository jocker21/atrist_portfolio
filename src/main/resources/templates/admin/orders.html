<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Замовлення | Адмінка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Портфоліо</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/admin/artworks}">Картини</a>
            <a class="nav-link" th:href="@{/admin/blog}">Блог</a>
            <a class="nav-link active" th:href="@{/admin/orders}">Замовлення</a>
            <a class="nav-link" th:href="@{/gallery}">Сайт</a>
        </div>
    </div>
</nav>

<main class="container my-5">

    <h1 class="mb-4">Замовлення</h1>

    <!-- Якщо замовлень немає -->
    <div th:if="${orders.isEmpty()}" class="text-muted">
        Замовлень поки немає.
    </div>

    <!-- Таблиця замовлень -->
    <div th:unless="${orders.isEmpty()}" class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Покупець</th>
                <th>Картина</th>
                <th>Телефон</th>
                <th>Статус</th>
                <th>Дата</th>
                <th>Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td>
                    <div th:text="${order.customerName}"></div>
                    <small class="text-muted" th:text="${order.customerEmail}"></small>
                </td>
                <td th:text="${order.artwork.title}"></td>
                <td th:text="${order.customerPhone}"></td>
                <td>
                    <span th:switch="${order.status.name()}">
                        <span th:case="'NEW'" class="badge bg-danger">Нове</span>
                        <span th:case="'SEEN'" class="badge bg-warning">Переглянуто</span>
                        <span th:case="'CONFIRMED'" class="badge bg-success">Підтверджено</span>
                        <span th:case="'CANCELLED'" class="badge bg-secondary">Скасовано</span>
                    </span>
                </td>
                <td th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
                <td>
                    <a th:href="@{/admin/orders/{id}(id=${order.id})}"
                       class="btn btn-sm btn-outline-dark">Деталі</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

</body>
</html>
