<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${artwork.title + ' | Портфоліо художника'}">Картина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Портфоліо</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/}">Головна</a>
            <a class="nav-link active" th:href="@{/gallery}">Галерея</a>
            <a class="nav-link" th:href="@{/blog}">Блог</a>
            <a class="nav-link" th:href="@{/contact}">Контакти</a>
        </div>
    </div>
</nav>

<main class="container my-5">

    <div class="row g-5">

        <!-- Фото -->
        <div class="col-md-7">
            <img th:if="${artwork.imageUrl != null}"
                 th:src="@{/(${artwork.imageUrl})}"
                 th:alt="${artwork.title}"
                 class="img-fluid rounded shadow"/>
            <div th:if="${artwork.imageUrl == null}"
                 class="bg-secondary text-white d-flex align-items-center justify-content-center rounded"
                 style="height: 400px;">
                Фото відсутнє
            </div>
        </div>

        <!-- Інформація -->
        <div class="col-md-5">
            <h1 class="mb-3" th:text="${artwork.title}">Назва</h1>

            <!-- Статус -->
            <span th:if="${artwork.available}"
                  class="badge bg-success mb-3">Доступна</span>
            <span th:unless="${artwork.available}"
                  class="badge bg-secondary mb-3">Продана</span>

            <!-- Ціна -->
            <div th:if="${artwork.price != null}" class="fs-3 fw-bold mb-4">
                <span th:text="${artwork.price}"></span> грн
            </div>

            <!-- Деталі -->
            <table class="table table-bordered mb-4">
                <tr th:if="${artwork.year != null}">
                    <td class="fw-bold">Рік</td>
                    <td th:text="${artwork.year}"></td>
                </tr>
                <tr th:if="${artwork.material != null}">
                    <td class="fw-bold">Матеріал</td>
                    <td th:text="${artwork.material}"></td>
                </tr>
                <tr th:if="${artwork.surface != null}">
                    <td class="fw-bold">Основа</td>
                    <td th:text="${artwork.surface}"></td>
                </tr>
                <tr th:if="${artwork.genre != null}">
                    <td class="fw-bold">Жанр</td>
                    <td th:text="${artwork.genre}"></td>
                </tr>
                <tr th:if="${artwork.widthCm != null}">
                    <td class="fw-bold">Розміри</td>
                    <td th:text="${artwork.getDimensions()}"></td>
                </tr>
            </table>

            <!-- Опис -->
            <div th:if="${artwork.description != null}" class="mb-4">
                <h5>Про роботу</h5>
                <p th:text="${artwork.description}"></p>
            </div>

            <!-- Кнопки -->
            <div class="d-flex gap-2">
                <a th:if="${artwork.available}"
                   th:href="@{/order/{id}(id=${artwork.id})}"
                   class="btn btn-dark">Замовити</a>
                <a th:href="@{/gallery}" class="btn btn-outline-dark">← Назад</a>
            </div>
        </div>

    </div>

</main>

</body>
</html>
