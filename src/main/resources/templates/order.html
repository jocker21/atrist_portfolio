<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Замовлення | Портфоліо художника</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Портфоліо</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/}">Головна</a>
            <a class="nav-link" th:href="@{/gallery}">Галерея</a>
            <a class="nav-link" th:href="@{/blog}">Блог</a>
            <a class="nav-link" th:href="@{/contact}">Контакти</a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <h1 class="mb-4">Оформлення замовлення</h1>

            <!-- Інфо про картину -->
            <div class="card mb-4">
                <div class="card-body d-flex gap-3 align-items-center">
                    <img th:if="${artwork.imageUrl != null}"
                         th:src="@{/(${artwork.imageUrl})}"
                         th:alt="${artwork.title}"
                         style="width: 80px; height: 80px; object-fit: cover;"
                         class="rounded"/>
                    <div>
                        <h5 class="mb-1" th:text="${artwork.title}">Назва</h5>
                        <div th:if="${artwork.price != null}" class="fw-bold">
                            <span th:text="${artwork.price}"></span> грн
                        </div>
                    </div>
                </div>
            </div>

            <!-- Форма -->
            <form th:action="@{/order/{id}(id=${artwork.id})}"
                  th:object="${order}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">Ваше ім'я *</label>
                    <input type="text" class="form-control"
                           th:field="*{customerName}"
                           th:classappend="${#fields.hasErrors('customerName')} ? 'is-invalid'"/>
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('customerName')}"
                         th:errors="*{customerName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" class="form-control"
                           th:field="*{customerEmail}"
                           th:classappend="${#fields.hasErrors('customerEmail')} ? 'is-invalid'"/>
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('customerEmail')}"
                         th:errors="*{customerEmail}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Телефон</label>
                    <input type="tel" class="form-control"
                           th:field="*{customerPhone}"/>
                </div>

                <div class="mb-4">
                    <label class="form-label">Повідомлення</label>
                    <textarea class="form-control" rows="3"
                              th:field="*{message}"
                              placeholder="Запитання, побажання..."></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">
                        Надіслати замовлення
                    </button>
                    <a th:href="@{/gallery/{id}(id=${artwork.id})}"
                       class="btn btn-outline-dark">Скасувати</a>
                </div>

            </form>

        </div>
    </div>
</main>

</body>
</html>
