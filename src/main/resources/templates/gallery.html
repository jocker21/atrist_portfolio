<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Галерея | Портфолио художника</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Портфолио</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link active" th:href="@{/gallery}">Галерея</a>
            <a class="nav-link" th:href="@{/blog}">Блог</a>
            <a class="nav-link" th:href="@{/contact}">Контакты</a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <h1 class="mb-4">Галерея</h1>

    <!-- ФИЛЬТРЫ -->
    <div class="d-flex flex-wrap gap-2 mb-4">

        <!-- Кнопка "Все работы" — активна если нет фильтра -->
        <a th:href="@{/gallery}"
           th:classappend="${activeCategory == null and activeYear == null} ? 'btn-dark' : 'btn-outline-dark'"
           class="btn btn-sm">
            Все работы
        </a>

        <!-- Фильтр по категориям -->
        <!--
          th:each создаёт кнопку для каждой категории из списка.
          th:classappend — добавляет класс 'btn-dark' если категория активна,
          иначе 'btn-outline-dark'. Это условный оператор Thymeleaf:
          ${условие} ? 'если_да' : 'если_нет'
        -->
        <a th:each="cat : ${categories}"
           th:href="@{/gallery(category=${cat.slug})}"
           th:text="${cat.name}"
           th:classappend="${activeCategory == cat.slug} ? 'btn-dark' : 'btn-outline-dark'"
           class="btn btn-sm">
        </a>

        <!-- Разделитель -->
        <span class="border-start mx-2"></span>

        <!-- Фильтр по годам -->
        <a th:each="y : ${years}"
           th:href="@{/gallery(year=${y})}"
           th:text="${y}"
           th:classappend="${activeYear == y} ? 'btn-dark' : 'btn-outline-dark'"
           class="btn btn-sm">
        </a>
    </div>

    <!-- СЕТКА КАРТИН -->
    <!--
      th:if — показывает блок только если список пустой.
      th:unless — показывает блок только если список НЕ пустой.
    -->
    <div th:if="${#lists.isEmpty(artworks)}" class="text-center py-5 text-muted">
        <p>Работы не найдены. Попробуйте другой фильтр.</p>
    </div>

    <div th:unless="${#lists.isEmpty(artworks)}" class="row g-4">
        <div class="col-md-4 col-sm-6" th:each="artwork : ${artworks}">
            <div class="card h-100 shadow-sm artwork-card">
                <div class="overflow-hidden" style="height: 260px;">
                    <img th:if="${artwork.imageUrl}"
                         th:src="@{'/' + artwork.imageUrl}"
                         th:alt="${artwork.title}"
                         class="card-img-top w-100 h-100"
                         style="object-fit: cover; transition: transform 0.3s;">
                    <!-- Заглушка если изображения нет -->
                    <div th:unless="${artwork.imageUrl}"
                         class="w-100 h-100 bg-secondary d-flex align-items-center justify-content-center">
                        <span class="text-white">Нет изображения</span>
                    </div>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${artwork.title}">Название</h5>
                    <p class="card-text">
                        <span class="text-muted" th:text="${artwork.year}">2024</span>
                        <span th:if="${artwork.technique}"
                              class="badge bg-secondary ms-2"
                              th:text="${artwork.technique}">
                        </span>
                    </p>
                    <!-- Категории работы -->
                    <div th:if="${!artwork.categories.isEmpty()}" class="mb-2">
                        <span th:each="cat : ${artwork.categories}"
                              class="badge bg-light text-dark border me-1"
                              th:text="${cat.name}">
                        </span>
                    </div>
                    <a th:href="@{/gallery/{id}(id=${artwork.id})}"
                       class="btn btn-sm btn-dark">
                        Подробнее
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-dark text-light py-4 mt-5">
    <div class="container text-center">
        <p>© 2024 Портфолио художника</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
